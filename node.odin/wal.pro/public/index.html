<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where is Waldo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="picker-screen">
        <h1>Where is Waldo?</h1>
        <p>Choose a level to play:</p>
        <div id="image-list">
            <p>Loading levels...</p>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="top-bar">
            <div id="timer">Time: <span id="time-display">0</span>s</div>
            <div id="characters-to-find"></div>
        </div>
        <div id="image-wrapper">
            <img id="game-image" src="" alt="Wheres Waldo"/>
            <div id="targeting-box" class="hidden">
                <div id="target-crosshair"></div>
                <ul id="character-dropdown"></ul>
            </div>
        </div>
    </div>

    <div id="end-screen" class="hidden">
        <div id="end-card">
            <h2>You found everyone!</h2>
            <p>Your time: <span id="final-time"></span> seconds</p>
            <input id="name-input" type="text" placeholder="Enter your name" maxlength="50"/>
            <button id="save-score-btn">Save Score</button>

            <h3>Leaderboard</h3>
            <!--  fixed: was "Leaderboard-list" (capital L) which broke app.js lookup -->
            <ol id="leaderboard-list"></ol>

            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
