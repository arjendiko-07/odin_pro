<!DOCTYPE html>
<html lang="en">
<head>
    <!--shows a single posts content and its comment form-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html">Back</a>

    <div id="post-container"></div>
    <hr>

    <h3>Comments</h3>
    <div id="comments-container"></div>

    <h3>Leave a comment</h3>
    <div class="comment-form">
        <input type="text" id="comment-username" placeholder="Your name">
        <textarea id="comment-text" placeholder="Your comment"></textarea>
        <button onclick="submitComment()">Post comment</button>
    </div>

    <script>
        const API = 'http://localhost:3000';

        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');

        // Load post
        async function loadPost() {
            const res = await fetch(`${API}/post/${postId}`);
            const post = await res.json();

            document.getElementById('post-container').innerHTML = `
                <h1>${post.title}</h1>
                <p>${new Date(post.created_at).toLocaleDateString()}</p>
                <p>${post.content}</p>
            `;
        }

        // Load comments
        async function loadComments() {
            const res = await fetch(`${API}/comments/${postId}/comments`);
            const comments = await res.json();

            const container = document.getElementById('comments-container');

            if (!comments || comments.length === 0) {
                container.innerHTML = '<p>No comments yet</p>';
                return;
            }

            container.innerHTML = comments.map(c => `
                <div class="comment">
                    <strong>${c.username}</strong>
                    <p>${c.text}</p>
                    <small>${new Date(c.created_at).toLocaleDateString()}</small>
                </div>
            `).join('');
        }

        // Submit comment
        async function submitComment() {
            const username = document.getElementById('comment-username').value.trim();
            const text = document.getElementById('comment-text').value.trim();

            if (!username || !text)
                return alert('Please fill in both fields');

            await fetch(`${API}/comments/${postId}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, text })
            });

            document.getElementById('comment-username').value = '';
            document.getElementById('comment-text').value = '';

            loadComments();
        }

        loadPost();
        loadComments();
    </script>
</body>
</html>
